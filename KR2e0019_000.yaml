  text: 欽定四庫全書史部五
  hash: sha256:b14f67abc523da03d0f3895f0bd1a4fc487d6483a8f1f723ef9860afcb5d9dd6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2e0019_WYG_000-1a, image: WYG0408/WYG0408-1035a.png}
body:
  text: 平宋録雜史𩔖提要臣等謹按平宋録三卷舊題杭州路司獄燕山平慶安撰一名大元混一平宋實録又名丙子平宋録前有大徳甲辰鄧錡方回周明三序紀至元十三年巴顔下臨安及宋幼主北遷之事與史文無大異同惟元世祖封瀛國公詔巴顔賀表諸篇及追贈河南路統軍鄭江事為史所未偹頗足以資參考此書黄虞稷千頃堂書目以為劉敏中作今按周明序稱平慶安請於行省奏加巴顔封諡建祠于武學故基武城王廟之東且鋟梓王行實行于世後又有大徳八年甲戌月案大徳元年為甲辰九月當建甲戌此盖當時習此俗之文不合古例謹附識于燕山平慶安開板印造平宋録一行俱不言新著此書是此書實劉敏中所撰慶安特梓刋以傳後人以其書首不題敏中姓名未加深考遂舉而歸之慶安耳今改題敏中名從其實焉敏中字端甫章邱人由中書掾厯官至翰林學士承㫖卒追封齊國公事迹具元史本傳乾隆四十六年十一月恭校上總纂官臣紀昀臣陛錫熊臣孫士毅總校官臣陸費墀平宋録序伊尹相湯伐桀升自陻而征自葛太公佐武伐紂戰於牧三千人而滅葢伊吕師貞丈人湯武革命順乎天而應乎人也自古受命平江淮者皆非天子仁義之兵務快私意深入重地或乖天時拙於地利失於知幾應變彼已虛實之勢鮮有不資於敵者矣故曹孟德一百萬敗於赤壁苻堅九十萬敗於淝水蒙恬二十萬敗於荆郢身耻名辱遺誚千古亦徒勞人爾哉我聖元大丞相巴延公承聖明文德不干羽兩階而萬邦來格統文武全才不孫呉七書而亡宋無敵取襄淮如拾芥平江南猶反手也大德七年杭州路司獄官平慶安建白大丞相太傅巴延公加封淮安王諡忠武創祠立石列於武成王廟左又次第平宋録訖大路推官王國寶請序其首余謂功臣勲烈具姓名者一百二十餘人悉列於目然於正野史更為收摭建異論立竒績於當時者以為全書激勸後世又有光於史筆者何多幸耶抑試論之太公望前代封昭烈武成王以其一戎衣天下大定歸馬於華山放牛於桃林使周之子孫九百二十七年不復用兵此其所以為武成王也又封呉孫子於右漢張良於左亞於昭烈血食配饗夫孫子者雖著兵法十三篇有臨時應變萬舉萬全之能不過破楚入郢皆戰國諸侯抗兵相加未嘗混一區宇齊魏燕趙秦晉尚為勍敵莫敢側睨故將鑑博議孫武操術有餘於權謀不足於仁義可以為春秋諸侯之將不可為三代王者佐也吾淮安王則不然天姿神邁雄才大略運籌計筭料敵决勝豈止十三篇權術而已哉皆以仁義不殺為主耳吾聖天子以仁義將將淮安王以仁義將兵簞食壺漿室家相慶一統天下郡縣四海無往而不㨗則尺地一民莫非有者矣異哉聖元豪傑何其盛耶大德甲辰秋七月朔玉賔子鄧錡序天以大元世祖皇帝聖神文武一統天下時則有若巴延丞相如阿衡之於成湯太公之於武王可謂聲應氣求雲龍風虎之㑹哉中統四年入侍天顔一命中書省平章冄命中書省左丞相三命領樞宻院事至元十一年甲戍秋九月董師南伐浮漢江而下者降復州不以一兵一騎入城不鹵一民不掠一物所至皆然而斗南諸郡望風歸附矣十二月辛亥舟師出沙武口入大江宋之所恃者江無江則國亦無矣此丞相獨斷第一功也乙卯以舟載鐵騎三千令阿珠平章上流二十餘里青山磯戰於江中果得南岸拂早來報丞相大喜此一舉天下之竒兵也一相渡上流一相渡下流天下定矣丞相時親攻陽邏堡撃走夏貴數十萬衆天下大定矣於是黄以西鄂以東郡無不降安慶范文虎為先鋒十二年乙亥春二月庚戌宋平章賈似道部孫虎臣兵十萬餘屯丁家洲遣稱臣納幣乞退師不許已未大戰江中撃走之二人僅以身免四月留屯建康俟秋冄舉七月朝上都拜中書省右丞相保奏阿珠拜左丞相右相東下兵盡東海左相西上兵盡南海天下大定矣八月自淮東渡江常州已降復叛十一月屠其城十二月宋相陳宜中約降十三年丙子春正月至長安陳宜中不至遁甲申至臯亭山宋使來獻寳璽降表三月丁卯入杭城甲戌赴闕遷宋全太后幼主北行太皇謝太后病未遷福王與芮相呉堅以下皆北宋相文天祥先留軍中至鎮江遁此丙子平宋録之大畧也然則以世祖皇帝之聖佐以巴延丞相之賢天固與之宋以老后幼主佐以權臣賈似道之姦其罪之尤大者叛盟爽約留信使於淮郡援逆雛於山東天實亡之福善禍淫皆天也求為此序者前杭州司獄燕山平慶安大德八年甲辰九月十五日通議大夫前建德路總管兼府尹方回撰司獄平慶安上言於朝立太傅巴延公之祠於錢塘武成忠烈二廟之間未獲先世之令典以宜其施惟耆艾是求次及於僕夫為世功業吾山林之士所不言也謝不能已復以所聞昔先王之有天下也於其左右之臣必疇其爵邑錫之土田樹之旂常分之彝器使其子孫奉其祭祀若周之太公漢之子房是其人已封建既廢斯道不復而名臣之迹亦有所表以不泯于世故白起祠於杜郵馬援祠於南海諸葛祠於三巴張巡祠於睢陽皆所以明施報之義揚盛大之業也今國朝之興元輔之臣股肱爪牙之士辨博之人肩摩踵接固多有之以僕所覯未有逾於太傅者也用兵江漢不嗜殺戮南下之日萬姓謐然是太公之將也輔我聖皇克正大位是子房之傅也而廟祀之禮未及白起馬援之徒則人之説者固齗齗於是矣亦何以顯昭代之恩立賢者之勸哉况於錢塘為立功之地飭之祠宇使髦稚承事無有厭斁其義不淺亦使武成之廟太公子房之靈有昭有烈顧不偉歟夫揚國家之美者臣子之心也捐已然之物者天下之言也僕夙嬰孤蹇寄迹黄老飄舉世外何取何遺以其􅓪於僕也聊誦所聞酬其請當塗杜道堅敬書人有禦大災排大難立大功則祠祀之謂其能為斯民立命為斯世開太平追慕其功德使之血食於後世如禹之平水土伊尹之相湯太公之佐武王周公之輔成王漢之三傑蜀之諸葛孔明晉之羊叔子唐之裴度顔真卿郭子儀皆廟食於百世不廢也惟我大元巴延太傅大丞相忠武淮安王以振振麟族㳺於宗藩中統癸亥由西入覲世祖皇帝一見之頃如協夣卜托以肱股心膂之寄随拜中書平章事凡軍國繁劇剖决無留至元改元以來宋權臣賈似道於我大國背盟失信至元甲戍秋王奉詔南征冬十二月大兵飛渡長江如履平地暨還闕大拜復提師取江淮數十州直𢷬蘇秀所向風靡兵不血刄皆納欵降附至元丙子正月十八日軍次杭州北闗秋毫無犯市不易肆宋都生靈咸被更生之德時屯兵浙江沙滸聞宋太后與宫女宫中耽望仰天祝曰海若有靈波濤大作一洗而空之夫何胥濤薾遁者三日自非王忠誠感格疇克臻此宋人始知天助人順氣數將移遂於二月之六日率其國大臣等望闕拜伏歸覲王随以宻㫖召還班師振旅其豐功偉績允謂窮天地亘古今不世之盛名無以加於此者雖庸人孺子皆得而言之惟王謙謙不伐了無德色告成於上勇退揆席優㳺緑野二十餘年天下蒼生方將徯王復用柰降年不永一旦棄人間事至今江南遺留感王不殺之恩懐王撫綏之德聞王之薨莫不涕流王生於丙申薨於至元甲午之冬享年五十有九子孫皆顯於朝惟王恪恭乃職克成大業未有能發王之心而聞諸上者獨杭州路司獄燕山平慶安奮身陳言於宣撫奉使嘉其言而轉呈都省遂獲聞奏追封淮安王諡忠武都省俯從祠祀之請俾之募縁以集其事平司獄又能貨廬買木以倡其首請佃杭城王宋武學故基武成王廟之東建立祠宇徃來之人得瞻廟貌皆發忠義之心仁義哉平司獄之操心也且鋟梓王行實傳於世名之曰丙子平宋録開卷瞭然見王勲業之大凡當時同心戮力之人因王而得彰之名於天下後世又知平司獄倡義揚善之盛徳顧不偉歟時則有嘉其志之竟成囑余為之序云大德八年嵗在甲辰秋九月前松江府正錢塘周明序太傅巴延公像贊天生哲人具知仁勇其功伊何正大一統當塗杜道堅敬贊
