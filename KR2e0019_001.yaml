body:
  text: 平宋録卷上元劉敏中撰丞相素有盛德不屑細務重厚深沉外莫窺其際中統四年自西域入覲朝廷至尊一見如有所感遂以德器遇之以心膂寄之拜中書平章事雖入省預政默然寡言幾數月餘每事參決無不中理八座皆驚冉拜中書左丞相次領樞密院事調遣四方軍馬務繁無少凝滯至元十一年秋九月分閫南伐其折衝禦侮極有方略信賞必罰得士衆心尤明於知人其或以文進或以武用無不稱職臨戎制勝規畫經理英謀獨運以之攻城野戰者某處宜攻某處宜守某時啓行某時利戰如此而成如此而敗臨機應變間不容髮與夫兵家竒正分合之術車騎卒伍之陳山澤水陸之戰若合符節信乎其深於兵矣孫子論智信仁勇嚴五者丞相實全之且古之取江南者蓋有之矣然皆值其君臣庸暗謀謨乖次內外離叛是以用力少而見功多所謂乘其間投其隙故得以肆其志何况宋三百餘年人心堅固君臣輯睦城郭修完兵甲精利糧儲充足將士如雲諸臣盈廷自我大元國以來梯航所至萬國來朝靡不臣屬抗衡不已遂為勍敵丞相總兵江南旗旄所向戰無堅陳望風披靡長驅徑搗如入無人之境取漢鄂如拾遺摧蘇杭如拉朽宋將身竄膽落救死之不暇用能獲其君臣收全功而還使我大元之化雷動風行際天所覆悉為臣妾何其盛哉至元十一年甲戍正月上命右丞相巴延節制諸軍伐宋七月巴延陛辭上諭之曰古之善取江南者唯曹彬一人汝能不殺是一曹彬也甲戍九年大會兵於襄樊是月丁亥沿於漢江而下前後延袤旌旗數百里水陸並進丞相遣萬户武顯等前鋒趨郢州至溧水時值雨淋漲溢以無舟楫病涉遂駐兵於溧水之濵丞相大軍繼至武顯等趨迎馬首告曰溧水泛濫軍馬懼其漂沒以故待之丞相怒責曰此水小不敢渡焉敢渡大江耶佇馬軍中召一壯士負甲仗渡水而軍馬長驅悉渡亦無漂沒者諸將長其威武諸軍既渡丞相令禁軍中有敢殺馬以罪罪之於是一軍人殺馬即遣誅之至炎山前鋒來報郢州消息丞相遂至郢軍郢城之西其城在江北岸以石為之髙接山形矢石莫能近攻之無益有人來言江南有城曰新城彼於江水中密樹樁木以絶舟楫往來下流又置城於黃家原彼軍堅拒諸將極難為力於是丞相歷觀郢之形勢其黃家原堡西有溝渠深闊數丈霖雨月餘其水漲溢南通一湖至江甚近可令戰艦悉達漢江以避郢軍言訖丞相遣數將率兵進黃家原堡即日克之總管劉二李勞山首獲戰功丞相遣兵圍郢又遣兵衆治平江堰破竹為席地蕩舟而過郢城遂入漢江大軍將進諸將告曰郢城乃我之喉襟今不取而過後為歸路患必當取之不聽諸將數言郢之不利丞相罵言汝嘗欲為困襄陽之計俱為龍斷者耶用兵緩急我其知之况攻城乃兵家之下計大兵之用豈惟在此一城哉若攻此城大事失矣冬十一月戊子大軍發郢城丞相而下平章阿珠及諸將帥不滿百騎殿後而進前去大軍數里之間後有郢州城將帥趙統軍帥精兵數千騎追之丞相暨平章阿珠等未及介胄而回渡迎敵大破郢兵於漢上丞相親將馬軍揮戈斃之其餘將士死者不可勝計生獲數十人乙未至洋沙敷陳禍福招諭歸降其守軍串樓王構索王等堅壁不降遣兵攻之時軍中有相士李國用者祭風風遂大起以助兵攻丞相令炮手張元帥等順風以火炮攻之煙熖燎天俄而城陷生擒首將串樓等四人丞相令曰應拒敵者悉斬之沙洋南五里至於新城其將邉都統鎮守焉丞相令軍衆將戮沙洋軍人首級列於城下執縳沙洋將串樓王等望城呼曰邉都統宜速歸降如其不然爾禍在於目前至暮其將黃都統踰城而降丞相擬授招討使即以金符佩之又遣人復招邉都統回言曰請參政吕文煥話於是參政吕文煥乘騎於城下彼軍一時飛矢如雨中吕文煥右臂墜馬抵城避之須臾奔趨而已已亥丞相遣兵衆攻之彼將統副任寧踰越城而降丞相督衆乘勢攻之下令曰如降者悉免應拒敵者皆斬之其城中軍民往往踰城而降是日進攻拔之首將邉都統自焚而死於是丞相將沙洋所擒將串樓等四人亦誅之大兵追至復州遣人諭其主帥曰汝曹若知幾而降有官者仍居其官吏民按堵如故衣冠仍舊市肆不易秋毫無犯關會銅錢依例行用其翟安撫貴即日出降諸將言於丞相曰自古降禮當要降表須知計點糧軍數差官鎮守丞相不聽傳諭諸將無令一軍入城違者斬之於是無秋毫之擾丞相溫言慰諭之翟貴曰貴令官守復州如是不降一郡生靈必遭殄滅貴今已降家屬在鄂州必不能免丞相曰汝今迎師而降鄂州親屬可令無虞云云丞相召貴曰復州去江陵不逺汝遣使去招諭云云付汝蒙古文字今使江陵之人賫之如遇後軍見之不敢為害云云諸將又曰當要降表須知錢糧軍數丞相曰不然倘復州不肯歸附亦不宜攻擊自今時日相逼前去大江不逺我軍悉戰力爭不在於斯在於渡江耳諸將皆曰諾丞相大會諸將議渡江事即日遣總管劉深千户馬福觀沙湖水勢令諸將皆趨漢口渡江諸將曰漢口水急彼軍且有備禦丞相不聽我軍徑過淪河軍於蔡店去漢口且近是日兵衆圍漢陽軍取漢口渡江夏貴併力守禦丞相遣數將帥舟師至夜復回淪河沙湖曰汝輩如克陽邏堡或沙武近處遣人速來報先遣萬户阿嘍罕蒙古騎兵倍道兼趨沙武口丞相帥兵前進冬十二月庾成軍於大江之北丞相輕騎觀大江形勢辛亥自漢口開壩引船入淪河轉至沙武口逹於大江壬子丞相以戰艦萬計相尾而至先令戰艦數千艘泊於江岸北屯布以輕重維其後會於淪河灣口其蒙古漢軍步騎數十萬衆列於江北旌旗彌望宋人觀之駭然墮氣即日夏貴帥漢鄂舟師順下流迎敵至夜彼潛發舟師犯我軍船有總管張當見之遂戰宋兵敗還是日諸將言曰沙武口南岸彼屯戰艦一隊可以攻取丞相不聽吕文煥又言彼船攻之必獲丞相答曰吾亦知其必獲吾之所慮諸將獲小功驕惰其志有失大事吾自料之可一鼓而渡江獲其全功無貪小利諸將皆曰然丞相令諸將各修攻具進陽邏堡一名武磯癸丑詰旦遣人陽邏堡往諭宋之將士宣布朝廷威德招諭來降宋將弗聽夏貴以戰艦數千餘艘列於大江之下橫其江靣其勢堂堂若不可近甲寅又遣人敷陳禍福於宋將宋將答曰我輩纍受大宋重恩政當戮力死圗報功此其時也安有叛逆歸降之理備吾甲兵決之今日我宋之天下賭博孤注輸嬴在此一擲耳丞相遂指揮諸將進兵攻陽邏堡城竟日不克是日軍中相士李國用告丞相曰天道南行大江必渡夜觀金木星相犯若二星交過則可渡矣丞相曰征伐大事戰勝攻取在將之籌畫天道幽逺安可準笑而慰之乙卯復攻之密謀於阿珠平章曰今宋將之心謂我必拔此陽邏堡可以渡江况此堡堅攻之徒勞若今夜令汝鐵騎三千泛舟泝流而上趨視其陳料彼上流雖有備而不堅當為搗虛之計以來日詰旦且渡襲江南岸速遣人報我阿珠平章然之是夜遂行於上流二十餘里泊於青山磯中夜帥舟戰於江中果得南岸丙辰拂早阿珠平章遣譯史馬文志來報曰平章承命而往已過江矣丞相大喜遣步將數萬急攻陽邏堡軍中有被傷者親為安慰賜藥以療之由是愈得士衆心臨陳無不用命以一當百是日丞相被堅執鋭親冒矢石臨於行陳指揮諸將帥舟師數萬衆直衝宋將兵船大戰江中我軍乘鋭攻之無敢當其鋒宋兵大潰於江中陽邏堡人心瓦解宋兵數十萬衆死傷者幾盡流尸蔽江而下夏貴僅能脫命棄舟遁去白虎山抵暮方止諸將舉觴稱歎曰自大元開創以來丞相出師一鼓而下江左乃建大元丕洪之業不世之功非丞相其孰能與於此丞相答曰殆非我一人之智乃聖天子洪福諸將之力也於是留宿於江壖次日凱還勞軍會議取鄂州戊午大兵渡江已未漢陽軍降是日早至嶽州遣吕文煥斷事官楊仁風總管楊椿等直抵城下宣揚威武曉以成敗曰汝之宋國所恃者江淮而已今我大兵飛渡長江如蹈平地汝輩不降而何若爾堅拒大兵一舉枕尸流血在於目前生靈何辜於是鄂州張晏然遣計議官王屆出城議降事庚申張晏然率衆來降辛酉大宴於李廷芝園壬戍丞相定新官品級升加有差撤宋兵衆分於諸軍之中其城向日有陷宋邊民及戍卒甚多往往悉黥其靣相率來告願歸故里丞相悉縱之號令諸將曰所部軍兵毋令侵暴百姓違者罪及官長去苛從簡民皆恱服綏撫既畢乃令蒙古總管呼圖克岱爾及新附官趙都統孟都統等馳驛奏渡江之捷又遣萬户阿嘍罕提精兵數萬暨前鋒黃頭奪夀昌糧得四十萬斛以充軍餉鎮守黃河議留左丞阿爾哈雅宣撫斷事官楊仁風郎中闕鼎提控宋熙及諸將分兵守鄂仍行中書省己已丞相暨平章阿珠領兵東下庚午露宿中夜丞相遣阿珠率舟萬餘衆先據黃州江口丞相至夀昌遣荆湖宣撫程鵬飛總管楊椿往諭城守副制置陳燮燮遣總管石國英劉仁等過江至夀昌請降仍求名爵丞相曰汝既率衆歸降何必慮及名爵率令石國英等還黃州丞相即召幕官議陳燮名分事即以沿江大都督許之燮大喜十二年正月癸酉丞相從舟抵黃州城下陳燮出降次日多示榜文綏撫居民內外帖然陳燮兵分置諸將召燮問曰汝有子乎陳燮答曰有子巖守連水可密遣人致書招來丞相從其言是夜陳巖濳出繼而遣使分道招諭黃􅋖石金剛臺諸山鎮悉降丁丑丞相與阿珠召陳燮吕文煥謀取蘄州丞相曰向聞管景模王滕吕師道等與汝最相親汝可密書示之則令來降不亦可乎於是陳燮吕文煥遣人至开州營景模答書來降辛巳先令吕文煥陳燮及蒙古萬户等選水軍精鋭者數萬衆泛舟而下趨开州壬午平章進兵蓮子灣是夜吕文煥遣使賫賈似道夏貴與管景模池州張林等書及設甘言來召張林今欲先據开州丞相密議令阿珠帥舟師先造开州丞相部水陸之師繼至开州城下是日管景模率衆出降加以兩淮宣撫使吕師道授同知劉千户丹達爾鎮守即日阿珠率舟師先進趨江州丞相嚴戒將士曰甲仗俱要精礪違者罪之水陸並進癸未宿於富池甲申軍於城乙酉雨作江州吕師夔錢真孫遣人逺迓丙戍至江州城中士庶拜迎馬首是日大宴戊子吕師夔請丞相及阿珠等大宴庾公樓即日安慶范文虎遣人持酒果來迎南康軍官吏來降是日有安撫錢真卿選趙氏宗族女佳麗者二人盛粧欲納丞相丞相辭曰我奉聖天子命興仁義之師取江南除殘去虐豈以女色移我之志乎郤不受即遣歸其家宴罷出城宿於東郭夜半風大起己丑大雨丞相定渡江人員功賞時雨連日不止令吕師夔傳檄江右州鎮播揚威德招諭歸附范文虎遣其姪機宜請丞相速來欲降丙申丞相議江右已歸附州軍官員名爵及進取事體功賞等事令左右司員外郎石天麟同萬户額森布哈馳驛赴闕敷奏戊戍安慶范文虎遣使來報安塔哈劉整等行樞密院遣軍臨城招諭我輩不從衆心願俟丞相池州張都統亦遣人來降丞相令阿珠帥舟師先造安慶丞相率水陸兵至湖口湖口岸闊數里遣千户寧玊等修繫浮橋以渡兵衆時風大水急橋不能成或言於丞相曰番陽湖內大孤山神祠請禱之丞相然之遣人詣大孤山禱曰欽奉大元皇帝命舉兵以征不庭長江既渡今湖口大風數日阻我兵不能進如祭之風定後則許汝嵗時血食祭享若風不息汝必不安是日祭回風息大軍遂渡丞相令江州士民嵗時祭享丞相發江州阿珠遣使來言曰安慶范文虎已降今依命同本官招諭池州二月丙午大兵至安慶丁未丞相令行樞密院軍馬過江相合行院官劉整卒戊申發安慶庚戍至池州張都統出郭迎丞相是日賈似道孫虎臣帥師十餘萬衆於池州下流屯於丁家洲賈似道遣宣使阮克已宋京等賫書求和請退兵稱臣願嵗貢幣丞相遣千户囊嘉特暨來使同往答書於似道云我奉旨舉兵渡江為爾失信之故安敢退兵如彼君臣相率納土歸附即遣使聞奏若此不從備爾堅甲利兵以決勝負囊嘉特往從求和不從歸附丁巳丞相率兵至於丁家洲去彼軍數里屯駐戊午丞相觀賈似道孫虎臣兵衆數十萬勢若雲屯己未丞相指揮諸將授以方略夾於江岸樹炮弓弩等具併力攻之丞相暨阿珠乘舟督戰宋兵大敗追殺數十餘里江面流尸水為之赤賈似道孫虎臣僅得脫太平州孟之搢出郭迎降是日建康翁都統遣人來報云趙制置棄城遁去請大丞相速至受歸附丞相先遣吕文煥及招討索多按察副使焦寬甫等賫榜文往建康撫諭軍民丞相進兵過太平三月癸酉至建康大賚三軍鎮江亦遣使來降丞相遣行樞密院軍馬屯守鎮江由是淮西江南滁州寧國等大小數十餘城傳檄欵附庚寅遣員外郎石天麟等皆詣闕奏事至尊大恱凡渡江獲功人員及士卒升賞軍務等事皆可其奏丞相駐師建康令樞密院安塔哈參政董文炳等分兵鎮守鎮江兩淮沿江所歸附州郡俱選素有威望萬户人員與新附官同鎮守撫治丞相約束諸將分守城壁者不令下鄉侵擾人民違者加之重罪是月尚書亷希原侍郎嚴忠範議官宋德秀等奉國書使宋臨安請益兵護送丞相曰汝既奉國書前赴臨安莫若先遣一個宣使前往諭彼官吏預知其意然後可進况我大兵壓境繼後而進宋人必未敢傷害汝輩不宜益兵護送吾恐宋人見汝輩多擁兵衆心生疑惑别有異議於汝輩深為未便切宜熟慮亷尚書等堅請護送遂許之翌日遣兵數百人護送至獨松嶺皆被宋兵所害果如所料次日令孟之搢及索多行江都宣撫事撫治建康臨安洪都統輩密遣人從間道致書於建康歸附官翁都統徐都統偽相通好其辭迫切言殺信使之事宋太后嗣主實皆不知乃邉將之罪今為搜捕斬首謝罪宋氏君臣意望大兵不欲東向願輸嵗幣請煩諸君代於大丞相處善為辭焉丞相聞之謂諸將佐曰宋人譎詐為計以視我之虛實從當就而用之臨安之行孰可同往亦觀彼中事體仍為我宣布朝廷威德令彼之君臣早為歸附免致加兵使生靈無辜塗炭諸將佐皆曰善吕文煥等言於丞相曰議事官張羽為人端慤剛決兼有才略其人可往丞相然之召而問之羽曰雖蹈亷嚴之覆轍然事不避難臣之職也羽何敢辭夏四月乙丑遣張羽與宋人同之臨安至蘇州遇害時人莫不傷之平宋録卷上
