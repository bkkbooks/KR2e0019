body:
  text: 平宋録卷中元劉敏中撰夏四月乙丑阿珠奉聖㫖分兵築圍守揚州屯於瓜洲城丞相與吕文煥及諸將鎮守建康候秋再舉翌日侍奉御愛新奉㫖召丞相赴闕計事丞相令蒙古萬户阿嘍罕權省事仍咨升郎中孟祺員外郎劉江議事五月辛巳丞相趣裝發建康壬午至鎮江㑹阿珠安塔哈等議鎮守等事仍諭諸將練習所部水陸士卒甲仗務要嚴整緩急適用毋令怠惰諸將授指揮還癸未同吕文煥濟江北石天麟從行至清河口丞相馳驛先赴闕敷陳平宋籌畫至尊悉皆嘉納七月己丑丞相拜中書右丞相遂奏保平章阿珠之功亦拜中書左丞相八月癸邜發上都南行八月丁未至大都省院臺衆官留宴三日辛亥發大都自河間取道山東路直入都經圻潭漣海等處巡視邊陲要害壁壘堅脆用兵設備調淮東元帥右丞博囉歡左副都元帥右丞阿勒巴所部軍兵萬衆附江而進九月戊寅閲兵於淮安城下淮東招討使簽樞密院事阿爾默色守新城兵亦㑹合是日指授諸將方略已邜詰旦㑹兵於淮安城下令安東州歸附官孫嗣武等扣城大呼諭淮安等將許安撫曰丞相奉大元天子命舉兵南伐所向無前聲勢震天東連海嶠西抵川蜀㳂江州郡望風納欵其孰不知今我等名爵有光於宋乃至合境生靈俱獲安業汝曹思之宜速來降則可轉禍為福如不然城陷之日誅滅無遺悔將何及又繫文書打矢射於城中以搖衆心辛巳遣阿爾默色領本兵船鐵騎拒其北城西門丞相與博囉歡阿勒巴等親臨南城堡指揮諸將分道進攻其堡俄而兵衆鼓勇長驅登城遂拔之宋兵大潰趨奔大城之下我軍追殺直抵門橋斷遂不得進亦斬首數百級癸未平其南堡甲申發淮安南行丙戍至寶應軍戊子攻白馬湖克之徙屯於清口桃源進至髙郵境遣帳前哈必齊千戶色徹肯等先帥鐵騎數百趨髙郵遇宋兵出戰宋兵大敗斬首數級次日丞相率諸將閲兵城下觀宋壁壘而還進至范光湖避兵之民甚衆丞相遣人招諭悉降又遣侍衛軍總管顔聚等乘戰艦五十餘艘破草湖鄉賊即日克之令諸將秣馬俟行十月己酉至揚州庚戍㑹兵圍守揚州耀其威武平章阿珠及右丞張惠參政敏珠爾丹率諸將來迎壬子阿珠受左丞相宣癸丑丞相次大灣頭新堡命諸將指揮方略阿嘍罕自建康來見丞相是日大雨還營乙邜與左丞相阿珠兵合令阿嘍罕還建康起兵辛丑留博囉歡阿勒巴等部鋭兵萬衆守灣頭堡是日大兵南舉丞相觀楊子橋堡是夜宿於瓜洲壬戍渡江至鎮江宣讀聖㫖於府廨置行樞密院令官安塔哈董文炳同署行中書省左丞安塔哈部左軍諸將先攻常州不下丞相與阿珠議平宋大事遂分諸軍為三道㑹於臨安右軍以參政阿嘍罕四萬户總管敖拉齊等帥蒙古漢軍步騎十餘萬衆自建康出四安慶德趨獨松嶺左軍以參政董文炳蒙古官帥萬户張𢎞範萬户張抵都統范文虎王世強管如德史勝等省都事楊晦領幕府事水陸精兵數十萬出江入海取道江隂進趨許浦澉浦上海華亭等處丞相暨左丞安塔哈至中道行都省事統帥羣將咸受節度裁斷大事帥蒙古漢軍十萬衆水陸繼進趨常州是日左丞相奉詔㫖分兵鎮遏揚州屯於瓜州十一月己邜丞相出鎮江宿於丹陽壬午至常州前進之兵相持不决至日丞相帥大兵嚴圍其城壁以立木為之其池塹既深且闊攻之誠難丞相召諸將指授方略令各備攻具期於來日分道攻擊又先遣人大呼城下諭言曰城中將帥士庶宜速來降免爾遭拒敵之罪城中不聽癸未又令諸掾吏書諭文射入城中曰常州主帥將校庶士常州我大元已附之城爾衆復來拒之大丞相領兵臨城四面攻擊勢易摧枯耳然我念主上好生惡殺務以招徠為先連日遣人告諭未見聽從爾之士民勿以歸降復叛為疑爾之將士勿以拒敵我師為懼約以來日如能出城歸附以保生靈前罪一無所問不妄戮一人仍依沿江已附州城一例遷加爵賞四民各令安業若更執迷堅拒城破之日枕尸流血老幼無遺宜速審思毋貽後悔又不聽丞相親督帳前軍數千臨於南城又多建火炮及弓弩等連日夜攻之不息至甲申巳刻丞相怒叱帳前諸軍奮勇爭先登木城即竪丞相紅幟於城上四面並進宋兵大潰克之遂屠其城又蒙古都元帥實喇特穆爾萬户輝圗等率兵先據無錫乙酉丞相登常州水門遣人捕索賊兵悉斬之丙戌丞相號令諸將其拽炮鄉民廣給其榜各歸其鄉禁約軍人不得妄行虜掠犯者加以重罪由是逺近皆安丁亥遣萬户延徹爾萬户蒙古岱等部水軍數千巡捕太湖㑹兵於江戊子賞勞獲功人員己丑冬至庚寅遣伊奇爾岱宣撫遊顯索多總管楊椿等㑹實喇特穆爾兵遣輝圗兵先趨平江即日參政董文炳遣使來送兩淮帳下王都統雄即以嘉興招討使授之平江主帥王邦傑等遣張撥發汝達賫書來迓丞相丞相慰勞遣反遣使往諭輝圖等官曰此大兵到日宜嚴飭將士守護城池勿得縱令侵優百姓如有犯令入城者從軍法擬行省都事馬恕為常州尹多給榜文招懷未附之民是日阿嘍罕遣使來報曰所部軍兵已過廣德進趨獨松嶺丞相深然之十二月庚子發常州輝圗遣使博囉歡來報彼宋桞嶽奉使至無錫辛丑軍於無錫之西壬寅大設省幕㑹集諸將令奉使桞嶽來見丞相出示宋太后暨嗣主國書及示宋之大臣與丞相及吕文煥書桞嶽垂泣曰今日太皇太后年髙嗣君冲弱更在先帝衰絰中自古禮不伐喪望大丞相息怒班師免致三宫不安陸廣動搖敢不年年進奉嵗嵗修好此誠奸臣賈似道失信誤我國耳丞相答曰曩者我聖天子登極之初遣使奉國書以修和好汝國無賴執我行人一十六年所以興師問罪去載又將亷奉使等無故殺戮誰之過歟如其彼欲我師不進欲學錢王納土李王出降乎爾宋昔得天下於小兒之手亦失於小兒之手其道如此卿何多言桞嶽頓首泣下不已令千户囊嘉特館伴焉癸卯遣招討吹忠嘉千户陳奇塔特將宋桞嶽及從來者宋李二人并嚴某所奉國書赴朝廷禀奏丞相軍於望亭東令張惠吕文煥先赴平江同游顯等入城取人公事甲辰平江主帥王邦傑郡守王矩之等率衆逺來迎降止於寒山寺南乙巳軍於平江西南五里丁未丞相入平江登城觀兵遂撤宋軍布置我兵於城上既而復㑹諸將佐於府㕔事號令諸軍不得輒入人家擾害百姓犯者重罪於是居民宴然悅服即日遣囊嘉特范文虎下從者王政同桞嶽赴臨安録白諭宋主詔書一封又丞相白宋臣書云云董文炳遣都事楊晦來報所部軍兵已下許浦澉浦顧徑上海華亭等處已行撫定次第丞相曰凡歸附官可就便區處即日發回又遣使覘前路窄隘軍馬不容逗遛令千户寧玉等前部軍兵復修長橋等處通道不旬而成丞相召范文虎䝉古岱行兩浙都督事王邦傑充安撫事王矩之遙授溫州安撫其餘歸附官員升加不等又遣使諭董參政令萬户張𢎞範等軍還省别聽區處屯於平江癸丑譯史阿里自朝廷奏事回俱准所奏遣囊嘉特同宋使夏尚書吕侍郎等自臨安來賫到録白宋書云云辛酉宋使夏尚書等謁見丞相是日大宴議事癸亥遣宋使吕侍郎回乙丑范文虎下從人游華善同宋使沈節簽賫宋太后謝氏諭吕文煥敕并與丞相書云云是日諭諸將曰今日宋臣陳宜中遣人來為㑹於長鎮且觀地面寬足容我軍鄂囉之地遂號令諸將將所部軍兵序各翼行伍俾令前進其旌旗戈甲等事務要新整其全家屬輩留之於後仍省㑹嚴禁諸軍不許抄掠生口侵奪人財焚燒民屋如有犯者即以軍令從之諸將士為之屏氣無敢妄動者於是諸將聽受方略分左右翼而進諸將側目相視莫測其機亦無敢咨禀者又遣范文虎䝉古岱乘兵艦㑹阿嘍罕嘉鼐巴等取湖州丙寅詰旦登車平江官屬軍集邀丞相賀正甚堅丞相曰我之軍馬為大事豈暇問此遂行留游顯輝圖萬户呼圖巴哈王等分兵數萬鎮守撫治令密王等長橋鎮守太湖等處十三年春正月己巳嘉興帥劉安撫舉城迎降癸酉宋使軍器監劉廷瑞賫陳宜中書與丞相云云丞相亦回書云云同日遣囊嘉特之臨安為㑹乙亥宋劉察院賫到宋主稱臣表并宋臣與丞相及吕文煥書云云當即發回丁丑囊嘉特同宋都統洪模賫陳宜中吳堅與丞相書云云戊寅發宋洪都統還臨安是日丞相起嘉興留萬户呼都克千戶呼圖克齊等鎮守劉安撫以安撫庚辰宋使吳路鈴臨安來㑹長安是日遣還辛巳洪都統來迓是日至崇德壬午長安鎮陳宜中約不至癸未過長安鎮臨平甲申髙亭山丞相娘子來到丞相向問你怎生來俺自來你來呵俺跟前要冨貴也者你喫一盞酒大事未了你回去者娘子回程宋使趙吉甫賈餘慶同囊嘉特來獻傳國寶玉璽降表受訖即日遣邀召陳宜中出議降事乙丑兵至臨安北五十里有囊嘉特洪都統遣人來報云今日陳宜中兩淮張世傑蘇劉義劉師勇等挾廣益二王錢塘遁去惟太皇太后嗣君在宫不動丞相亟遣使分諭右軍阿嘍罕敖拉齊暨左軍董文炳范文虎諸軍據錢塘不令宋人來往守禦之丙戍遣宣撫程鵬飛計議官囊嘉特千户洪雙夀往臨安入宫諭太皇太后戊子宋太皇后謝氏遣丞相吳堅文天祥同知樞密謝堂安撫賈餘慶中貴官鄧惟善等來見丞相以溫慰之遂遣吳堅鄧惟善謝堂賈餘慶還臨安丞相顧文天祥舉動不常疑有異志惟留文天祥於軍中文天祥堅立思言歸丞相但笑而不聽文天祥於是目怒曰我此來為兩國大事實是好意况彼各男子已各釋之何故將我執留丞相以溫言答曰君勿怒汝為宋氏大臣責任非輕此來既是好意今日之事正當與我共之願為數日之留遂令魯克特索多館伴羈縻焉是日選平日與李庭芝相善者孟咨議段安撫田副使往諭揚州制置李庭芝又令程鵬飛賈餘慶洪雙夀之臨安換宋主降帝號表章及多給文榜於臨安市綏撫士庶無令驚擾市井熙然秋毫無犯己丑遣千户囊嘉特省據王祐賫玉璽前赴闕進獻是日丞相至臨安湖州市庚寅早丞相之錢塘觀潮於是宋宗室大臣以下及官屬來見丞相皆撫慰之閲兵而還辛卯董文炳阿嘍罕敖拉齊等來見丞相聽授指揮而去張𢎞範孟祺程鵬飛等賫宋主降表及太后招諭來附州郡手詔并三省樞密院文字令州郡一體歸附遣都鎮撫唐古岱趙興祖等先罷文天祥所招義兵二萬餘衆令各歸鄉里給與文榜皆悅而歸壬辰丞相登西湖北獅子峯俯觀臨安形勢至暮館於湖州市秀王府是日遣諸將以各部兵衆分守城面而又遣萬户察察爾岱李埒克戩及總管王俊等軍入城護宋氏宫城癸巳太皇太后令貴官王某卑辭勞問丞相亦撫慰之遣還甲午將宋氏馬步軍殿司及諸司兵衆分置於我師别行調遣其餘新募等軍有願歸者聽遣張都鎮撫等詣阿珠計禀准上公事及宋詔諭淮安懷逺夀州安豐等郡二月丁酉遣鎮邊劉并程宣撫子同錫里巴持宋氏詔諭兩淮并本省公文去廬州招諭夏貴及未歸附州郡其鎮邉劉係夏貴親舅程宣撫子及夏貴壻也以故遣之又令兵部郎中省文卿王世英等分鎮馬步司軍數千賫宋詔趨衢州等處招諭令降己亥令張惠吕文煥約阿嘍罕董文炳等入宫見謝后宣布主上寬仁大度辛丑委張惠阿嘍罕董文炳石天麟楊晦張𢎞範察察哩呼喇珠索多入臨安取㑹軍民錢糧之數及拘收宋朝百官誥命敕劄符印悉罷宋氏官府人散罷侍衛禁軍壬寅遣西蜀歸附官李胡亦持宋詔往招未下州郡又遣使者尚壁顯等之潭州行省賫宋詔諭湖南湖北兩廣福建州郡令一體歸附又令萬户錫里巴史樞兵鎮守湖州以歸附官趙與可授安撫遣孫嗣總管唐拾鎮守建德府以新附官方回授安撫遣總管髙與鎮守婺州孟安撫鎮守衢州是日丞相命諸將分兵鎮守臨安令阿嘍罕敖拉齊䝉古漢軍鎮屯西湖錢塘門等處實喇特穆爾輝圗伊奇爾岱鎮守錢塘仁和黃頭兵屯富陽相威等軍屯鹽官焦興黃順軍屯德清延徹爾劉源等鎮守湖州市䝉古岱范文虎撫治臨安以水弩炮諸將及别萬户諸軍分屯湖州市北如犬牙相御遣管如德過錢塘越上張示省榜禁約諸人不令侵損宋氏山陵丁未遣伊奇爾岱特穆爾起宋臣賈餘慶等四人赴昌化庚戌遣李知事招諭台州石國英招諭婺州及兩淮張等辛亥遣囊嘉特吳閣賫謝后詔再諭揚州李庭芝癸丑孟旗謝堂楊鎮赴省議追詔宋益廣二王事甲寅福王遣人致書於丞相其辭懇切丞相回言太后幼主及百官隨即歸附今日俱為一家福王不須疑惑冝速來同預大事甚妙遂遣使還己未石國英遣人送婺州降表是日發洪都統彭都統張都統吕尚書赴闕朝見庚申囊嘉特回奉密㫖召丞相還朝及遣宋君臣事辛丑遣本布周青等赴泉州招諭蒲知府壬戌遣史勝賫書赴越州請福王云云宋太后令楊提舉俞提舉同中貴官盧源守賫手詔及省文往福建諭廣益二王及從臣僚屬復還臨安浙東州郡牧守相繼歸附降赴日來三月丁卯丞相入城館於萬松嶺盧源宅己巳大宴於宋三省中庚午囊嘉特自瓜洲還省賫張都統鎮撫書呈為廬州舉城歸附事甲戌徽州招討李銓來降福王自浙東來見丞相安慰之是日㑹諸將於萬松嶺園中阿珠遣使來報廬州已降及鎮江文天祥出奔是日雨作丞相出城湖州市宿於秀王府阿嘍罕董文炳同預行省事孟旗從行赴闕石天麟仍領左右司事楊晦來谷之竒同預焉丞相暨安塔哈密議遷宋后幼主及其僚屬北行事丙子丞相先行至瓜洲待之安塔哈張惠阿嘍罕董文炳等於丁丑詰旦武備嚴肅入宫召宋太后幼主聽皇帝詔曰免牽羊繫頸之禮宋太后謂幼主曰荷天子聖慈不殺活此性命汝當望闕拜謝於是遷宋太后幼主及宫人出宫遂封府庫太后以疾言屢遣萬户趙興祖詣丞相請命丞相曰既不能起留之無得是日宋太后幼主同宫人出城止宿北新橋船中是日悉收宋之所貯寶玉督宋大臣以下僚屬俱從其行丞相班師之日及遷宋君臣百姓晏然不知閏三月十二日夏貴至燕京獻淮西諸郡二十一日巴延丞相回燕京有大旗書天下太平四字二十四日宋太后幼主至燕京宿㑹同館四月十五日赴上都二十八日至上都明德門官舍安歇五月初一日全太后嗣君早出西門五里外草地上太后福王隆國夫人中使作一班左北邉設一紫綿罜罳即家廟也廟前兩拜太后及內人各胡跪福王宰執如南地兩拜而進初二日太后幼主隆國夫人天曉盡出南門外十餘里宰執同屬官亦到鋪設金帛寶玉一百餘桌在草地上行宫殿下作初見進貢禮儀行宫殿宇宏麗金碧焜耀皇帝皇后升殿諸妃諸王俱升殿捲簾列坐宋全太后幼主福王宰執以次展裹服金服紫緋緑各依次序立班行甚整再拜班退升殿再兩拜就留御宴諭授幼主開府儀同三司檢校大司徒封瀛國公以平宋告天地祖宗於近郊遣祀嶽瀆設資大㑹大赦天下是嵗淮東西湖南北川廣得府三十七州百二十八關五監二縣七百三十三平宋録卷中
