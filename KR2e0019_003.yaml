body:
  text: 平宋録卷下元劉敏中撰宋太后書傳於淮東制置李知院吾老矣值此時艱比奉大元皇帝詔書俾相率來附以全宗社以保族屬以救萬姓然事已至此無可柰何舉國内屬今大兵在城三宫不驚九廟如故百姓安堵其餘州縣已戒嗣君下詔開諭俾各以其地歸於大元卿自守孤城勤勞甚至但根本已㧞縱欲固守民其何辜毋重困一方之人宋主詔勅揚州帥臣李庭芝自朕嗣基緒遭家多難權臣似道誤國背盟至勤大元興師問罪已入京城有詔許存宗社不害生靈准奉太后戒命舉國内屬根本已㧞其餘州縣縱欲固守民何辜焉詔書到日可順天時亟宜歸附生民免罹荼毒宗廟不至冺絶故兹詔示想宜知悉大丞相賀表臣巴延等言國家之業大一統海嶽惟明主之歸帝王之兵出萬全島夷敢天威之抗始干戈之爰及迄文軌之㑹同區宇一清普天均慶臣巴延等誠懽誠忭頓首頓首欽惟皇帝陛下道光五業統接千齡梯航日出之邦冠帶月支之國際丹崖而述職奄瀚海以為家獨此宋邦弗遵聲教謂江湖可以保逆命舟檝可以敵王師連兵負固踰四十年背德食言難一二計當聖主飛渡江南之日遣行人乞為城下之盟逮凱奏之言還輒奸謀之復肆拘囚我信使負乾坤再造之恩結納我叛臣盗連海二城之地我是以有六載襄陽之討彼居然無一介行李之來禍既出於自求怒致聞於斯赫臣肅將禁旅恭行天誅爰從襄漢之上流移出武昌之故渡藩屏一空扵江表烽烟直接扵錢塘尚無度德量力之心乃有殺使毁書之事屬廟謨之親禀掲根本之宜先乃命阿嘍罕取道於獨松董文炳進師於海渚臣與阿珠安塔哈等忝司中閫直指宋都掎角之勢既成水陸之師並進常州一破列郡傳檄而悉平臨安為期諸將連營而畢㑹彼極窮蹙迭出哀鳴始則為稱姪納幣之祈次則有稱藩奉璽之請顧甘言何益於實事率銳旅直抵其近郊召來用事之大臣放散思歸之衛士崛強心死在郊之横草都無飛走計窮一月之降幡始豎其宋主率諸大臣已於二月初六日望闕拜伏歸附訖所有倉廩府庫封籍待命外臣奉揚寛大撫戢吏民九衢之市肆不移一代之繁華如故兹惟􅌖筭卓冠前王視萬里為目前運天下於掌上致令臣等獲對明時歌七德以告成深切龍庭之想上萬年而為夀更陳虎拜之詞臣無任瞻天望聖激切屏營之至臣等誠懽誠忭頓首頓首謹言賀表聖人之兵仁而威無逺不服天下之勢離必合有險即平方期四海之㑹同豈許一江之限隔㨗書屢至慶頌交馳欽惟皇帝陛下至德體元中華開統美化既東西之被愛宇兼南北之分弗圗島夷輒拘使節誘納我叛將盜據我列城雖就鯨鯢之誅尚遺蜂蠆之毒蠢爾三苗弗率命予羣后徂征一皷而定荆襄再駕而降鄂岳开黃面縛江漢心歸鐵瓮之堅城自摧金陵之王氣何在楚地六千里不勞秦將之增兵錢塘十萬家已見吳王之納土偽將悉朝於國下幼君遐竄於海中方知恃險之差應悔求和之晩臣叨居牧寄喜聽凱音矧㑹充載筆之臣尤當述集勲之事駿奔郊命正海内一家之時虎拜揚休上天子萬年之夀賜宋主詔上天眷命皇帝聖㫖諭宋國主昔我太祖聖武皇帝睿謀雄斷奄奠諸國惟彼東南不修臣職昔爾宋與金隣逮至平金接我疆埸彼國常遣使於我家尋即殄絶俾失結好實爾自造乃我師已濟江仍且接兵復遣使以理往諭時爾順令歸欵事豈不殊及兵壓臨安方出請降論以國典固無寛宥然爾國政悉出權臣若爾母子初無所與脱既知之復以罪譴加於母子之躬固所不忍况爾舉朝來覲嘉乃是心而優渥之令可不伸乎庸錫寵章備兹異數可開府儀同三司檢校司徒瀛國公宜令准此至元十三年六月某日撫勞戰士竊惟古之用人能盡死力者不過閔其勞苦悦以使令而已兼兵以氣為主所貴感發振作不致有墮歸之意竊見襄陽之役以數十萬衆頓於堅城下經有四年暑天炎瘴攻守暴露不戰而疫死者無嵗無之即目下已是炎瘴江水向發設或如去嵗之夏宋人復以舟師來擾内以疫死冦必出而相應其利害所闗非輕當此正帥臣籌畫之日將士竭盡之時也今雖省官節制於上朝廷亦宜制為撫勞感發人心振作士氣愚見合無聞奏恩㫖詣彼軍前宣諭撫慰使功過兩明賞罰信必然後序其情而閔其勞使三軍之士僉曰我之死生有所歸矣我之勤苦為上知矣衆既喜其如此雖置之重地淹於嵗月人將奮發忠義心力一殫勇氣自倍而親上死長以為當然所謂説以使民民忘其死者也丞相巴延公勲德碑乾為天統元氣坤為地統元形輔以四時佐以六子天地所不言而化無為而成也欽惟憲天述道仁文義武大光孝皇帝體乾元以建國法坤元而紀年聰明叡智神武不殺握符闡珍混一區宇日月所照霜露所墜凡有血氣莫不臣屬首出庶物而萬國寜含𢎞光大而品物亨天覆之髙地載之厚不可名言不可繪畫所可得而見者四時之運行六子之變化繄輔弼之臣有若丞相巴延公之定江南其勲德尚可考已至元十有一禩甲戍冬十二月丞相總師渡江又明年丙子春師次杭之近郊行中書省以中間入杭連城列壘望風欵附農不釋耒兵不血刄市不易肆秋毫弗驚天命有歸人心欣戴不謀而同不戒以孚黃童白叟手額讚歎祝聖世君臣同徳時萬時億永福區夏無前偉績對天宏休於是乎在蟣蝨臣等嘗拜手頓首莊誦詔㫖深厚懇惻曲意招懷惟恐生靈枉受其害聖天子不殺之仁也丞相對揚休命壹是以不殺為事豈惟不殺抑又不貪東南茍安率嘗中稔綿厯積久休養繁庶權臣擅事貴戚殖私多貲厚藏富於公室子女如林玉帛如山倡冶珍怪未嘗過目士庶緇黃香荈圖書微有獻饋一無所取宫廷内儲府庫外峙謹䕶封鐍悉歸有司郊闗之外禁止俘掠分屯列戍田里相安既又發公廪以濟民食蠲方租以奠民居捐山林川澤之利以便民用減上供物帛之賦以寛民力易曰王命三驅失前禽也言順而向我者縱而弗禽也書曰民心無常惟惠之懷言能生斯民者民所歸也丞相杖鉞専征於國有大功為勲於民有大惠為德勲德之盛卓冠前古杭民千萬均受渥賜莫知所報士民率請伐石為勲德碑昭示無極銘曰皇元受命光宅九區旋乾轉坤駕唐軼虞至元建號混合輿圖一統之盛亘古所無賜鉞推轂宻勿都俞干戈所指仁義與俱豈其得已煩我師徒宇宙磔裂欲同其殊匪兵不服匪氓敢屠不亟不徐南邦是徂審勢効順爾簞爾壺爾貨弗掠爾孥弗俘江之廣矣亦既桴止天之所與將焉逋止相臣曰嘻我息爾孚不殺不貪申令前驅百城按堵于楚于吳杭民千萬易懼為娛大勲盛德可鐫可摹於萬斯年以侈廟謨至元十三年二月日四明史周卿撰宣授宣武將軍管軍總管汪宋英省選耆老陳相實耆老顧惪榮耆老班首喻震宗等立石右碑至元十三年丙子春二月建於杭之行中書省以紀殊績嵗月浸久適燬於火士民追念合詞祈請擬復舊觀省府重嘉其請而矜從之迺稍潤色其辭重立斯碑山可磨谷可堙此德此勲天地存至元三十一年春三月望日少中大夫杭州路總管兼管内勸農事冦元德謹跋并書丹篆額平宋録卷下
